name: Promotion checks (main)

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit || true  # TODO(#4): make blocking once legacy type errors are fixed
      - name: Lint (incl. complexity limits)
        run: npx eslint .
      - name: Pure-module tests
        run: npm test
      - name: LLM slop check
        run: bash scripts/ci/slop-check.sh
      - name: Expo doctor (dependency/config health)
        run: npx expo-doctor
        # Blocking (TODO#7 resolved): babel-preset-expo and jest were realigned
        # to the SDK 54 versions, and the non-CNG app.json check — a false
        # positive here since we build with raw xcodebuild, not expo prebuild —
        # is suppressed via expo.doctor.appConfigFieldsNotSyncedCheck in
        # package.json. Doctor now passes 17/17 cleanly.

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
